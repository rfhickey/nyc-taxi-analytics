version: 2

sources:
  - name: weather
    description: >
      Daily historical weather observations from the Open-Meteo archive
      API for Central Park, NYC. Loaded as-is into the `raw` schema by
      ingestion/load_raw_data.py.
    schema: raw
    tables:
      - name: weather_daily
        description: >
          Raw daily weather observations for Central Park, NYC, with a
          `_loaded_at` column added at load time. One row per day.
        columns:
          - name: observation_date
            description: calendar date of the weather observation
          - name: temperature_max_c
            description: maximum daily temperature, in degrees celsius
          - name: temperature_min_c
            description: minimum daily temperature, in degrees celsius
          - name: precipitation_mm
            description: total daily precipitation, in millimeters
          - name: snowfall_cm
            description: total daily snowfall, in centimeters
          - name: wind_speed_max_kmh
            description: maximum daily wind speed, in kilometers per hour
          - name: _loaded_at
            description: timestamp the row was loaded into the raw schema
