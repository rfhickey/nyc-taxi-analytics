version: 2

sources:
  - name: tlc
    description: >
      NYC Taxi and Limousine Commission (TLC) trip record data. Monthly
      parquet files published on the TLC's public CloudFront CDN, loaded
      as-is into the `raw` schema by ingestion/load_raw_data.py.
    schema: raw
    tables:
      - name: yellow_trips
        description: >
          Raw yellow taxi trip records as read directly from the TLC
          parquet files, with a `filename` and `_loaded_at` column added
          at load time. One row per trip.
        columns:
          - name: vendorid
            description: code indicating the tpep provider that supplied the trip record
          - name: tpep_pickup_datetime
            description: date and time the meter was engaged
          - name: tpep_dropoff_datetime
            description: date and time the meter was disengaged
          - name: passenger_count
            description: number of passengers in the vehicle, entered by the driver
          - name: trip_distance
            description: elapsed trip distance in miles reported by the taximeter
          - name: ratecodeid
            description: final rate code in effect at the end of the trip
          - name: store_and_fwd_flag
            description: >
              whether the trip record was held in vehicle memory before
              sending to the vendor because the vehicle did not have a
              connection to the server (Y/N)
          - name: pulocationid
            description: TLC taxi zone in which the taximeter was engaged
          - name: dolocationid
            description: TLC taxi zone in which the taximeter was disengaged
          - name: payment_type
            description: numeric code signifying how the passenger paid for the trip
          - name: fare_amount
            description: time-and-distance fare calculated by the meter
          - name: extra
            description: miscellaneous extras and surcharges
          - name: mta_tax
            description: tax that is automatically triggered based on the metered rate in use
          - name: tip_amount
            description: tip amount, automatically populated for credit card tips
          - name: tolls_amount
            description: total amount of all tolls paid in trip
          - name: improvement_surcharge
            description: surcharge assessed on trips at the flag drop
          - name: total_amount
            description: total amount charged to passengers, not including cash tips
          - name: congestion_surcharge
            description: total amount collected for the NYS congestion surcharge
          - name: airport_fee
            description: fee for pickups at LaGuardia and JFK airports
          - name: filename
            description: source parquet filename the row was read from, added at load time
          - name: _loaded_at
            description: timestamp the row was loaded into the raw schema
