version: 2

models:
  - name: fct_trips
    description: >
      Core fact table with one row per validated, zone-enriched yellow taxi
      trip, including derived duration, speed, and tip metrics. Grain: one row
      per trip.
    columns:
      - name: trip_id
        description: Surrogate key uniquely identifying a trip.
        tests:
          - unique
          - not_null
      - name: pickup_location_id
        description: TLC taxi zone id where the trip started.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_zones')
                field: location_id
      - name: dropoff_location_id
        description: TLC taxi zone id where the trip ended.
      - name: pickup_at
        description: Timestamp the trip started.
      - name: dropoff_at
        description: Timestamp the trip ended.
      - name: pickup_date
        description: Calendar date of pickup_at.
      - name: trip_distance_miles
        description: Distance of the trip in miles as reported by the meter.
      - name: fare_amount
        description: Base metered fare amount.
      - name: tip_amount
        description: Tip amount paid on the trip.
      - name: total_amount
        description: Total amount charged to passengers for the trip.

  - name: dim_zones
    description: >
      One row per TLC taxi zone, describing its borough, zone name, service
      zone, and whether it represents an airport.
    columns:
      - name: location_id
        description: Unique identifier for the taxi zone.
        tests:
          - unique
          - not_null
      - name: zone_name
        description: Name of the taxi zone.
      - name: borough
        description: Borough the zone belongs to.
      - name: service_zone
        description: TLC service zone classification for the zone.
      - name: is_airport
        description: True if the zone name contains "airport" or its service zone is "Airports".

  - name: dim_dates
    description: >
      Calendar date spine from 2024-01-01 to 2027-01-01 with common date
      attributes for use in date-based joins and reporting.
    columns:
      - name: date_day
        description: Calendar date.
        tests:
          - unique
          - not_null
      - name: year
        description: Calendar year of date_day.
      - name: month_of_year
        description: Numeric month (1-12) of date_day.
      - name: month_name
        description: Full month name of date_day.
      - name: day_of_month
        description: Day of month (1-31) of date_day.
      - name: day_name
        description: Full weekday name of date_day.
      - name: iso_day_of_week
        description: ISO day of week (1=Monday through 7=Sunday) of date_day.
      - name: is_weekend
        description: True if date_day falls on Saturday or Sunday.
