name: dbt CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # dbt-core pins mashumaro <3.15, but mashumaro <3.15 crashes dbt at
      # startup on current Python 3.12 patch releases. See requirements.txt.
      - name: Work around stale dbt-core mashumaro pin
        run: pip install --upgrade "mashumaro[msgpack]>=3.15"

      - name: Ingest one month of raw data
        run: python ingestion/load_raw_data.py --start-month 2025-01 --end-month 2025-01

      - name: Install dbt packages
        run: dbt deps

      - name: Build and test dbt project
        run: dbt build --profiles-dir .

      - name: Generate dbt docs
        run: dbt docs generate --static --profiles-dir .

      # dblect is pre-alpha and not on PyPI, so it is pinned to the commit this
      # project was audited against; pyyaml is a runtime dependency dblect does
      # not yet declare. Runs after docs generate so manifest.json and
      # catalog.json both exist. Fails the build on warn-or-worse findings.
      # See docs/structural_hazards.md.
      - name: Structural hazard audit (dblect)
        run: |
          pip install pyyaml "dblect @ git+https://github.com/dvryaboy/dblect@3fc46a44a763667c47b02117147aa653ca9d4334"
          dblect check .

      - name: Assemble docs site
        run: |
          mkdir -p docs_site
          cp target/static_index.html docs_site/index.html
          cp docs/dashboard.html docs_site/dashboard.html

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs_site

  deploy-docs:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
